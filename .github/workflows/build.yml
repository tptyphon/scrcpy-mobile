name: Build and Publish Unsigned IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja meson

      - name: Cache native libraries
        uses: actions/cache@v4
        id: cache-libs
        with:
          path: |
            output
            external/adb-mobile/output
          key: ${{ runner.os }}-libs-${{ hashFiles('porting/**', 'external/**') }}

      - name: Build native libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: make libs

      - name: Build unsigned IPA
        run: |
          cd scrcpy-ios
          xcodebuild archive \
            -project scrcpy-ios.xcodeproj \
            -scheme scrcpy-ios \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/scrcpy-ios.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/scrcpy-ios.xcarchive/Products/Applications/scrcpy-ios.app" \
            "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP" && zip -r scrcpy-ios-unsigned.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-ios-unsigned
          path: ${{ runner.temp }}/scrcpy-ios-unsigned.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/scrcpy-ios-unsigned.ipa
